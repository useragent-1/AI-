<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="AI 导航星图：像大型 AI 工具目录一样搜索、筛选、收藏和发现 AI 工具。">
    <title>AI 导航星图 - AI 工具搜索目录</title>
    <link rel="stylesheet" href="styles.css?v=7">
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  </head>
  <body>
    <div class="ambient-layer" aria-hidden="true">
      <canvas class="ambient-canvas" id="ambientCanvas"></canvas>
      <div class="ambient-glow ambient-glow-a"></div>
      <div class="ambient-glow ambient-glow-b"></div>
      <div class="ambient-spotlight"></div>
    </div>

    <div class="page-shell">
    <header class="site-header">
      <a class="brand" href="#top" aria-label="AI 导航星图首页">
        <span class="brand-mark" aria-hidden="true">AI</span>
        <span>
          <strong>AI 导航星图</strong>
          <small>AI tools directory</small>
        </span>
      </a>
      <nav class="top-nav" aria-label="主导航">
        <a href="#directory">工具</a>
        <a href="#categories">分类</a>
        <a href="#rankings">榜单</a>
        <button class="icon-button" id="favoriteToggle" type="button" aria-label="只看收藏" title="只看收藏">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m12 17.3-5.3 3 1.4-5.9-4.6-4 6-.5L12 4.4l2.4 5.5 6 .5-4.6 4 1.4 5.9z"/></svg>
        </button>
      </nav>
    </header>

    <main id="top">
      <section class="hero">
        <div class="hero-inner">
          <p class="directory-badge">THE AI TOOLS DIRECTORY</p>
          <h1>找到任何任务的 AI 工具</h1>
          <p class="hero-lead">搜索 700 个 AI 产品，按任务、分类、价格和热度快速筛选。</p>
          <form class="search-panel" role="search" aria-label="搜索 AI 工具">
            <label class="search-field" for="searchInput">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m20 20-4.7-4.7m2.2-5.3a7.5 7.5 0 1 1-15 0 7.5 7.5 0 0 1 15 0Z"/></svg>
              <input id="searchInput" type="search" placeholder="I want an AI for videos, coding, SEO, writing..." autocomplete="off">
            </label>
            <button class="search-button" type="submit">Search</button>
          </form>
          <div class="prompt-row" aria-label="快速搜索">
            <button class="prompt-chip" type="button" data-query="视频生成">视频生成</button>
            <button class="prompt-chip" type="button" data-query="代码">代码</button>
            <button class="prompt-chip" type="button" data-query="SEO">SEO</button>
            <button class="prompt-chip" type="button" data-query="PPT">PPT</button>
            <button class="prompt-chip" type="button" data-query="图片">图片</button>
          </div>
          <div class="stat-strip" aria-label="站点统计">
            <span><strong id="toolTotal">0</strong> tools</span>
            <span><strong id="categoryTotal">0</strong> categories</span>
            <span><strong id="freeTotal">0</strong> free/open</span>
          </div>
        </div>
      </section>

      <section class="category-strip" id="categories" aria-labelledby="quickTitle">
        <div class="section-heading">
          <p class="eyebrow">Browse by category</p>
          <h2 id="quickTitle">热门 AI 分类</h2>
        </div>
        <div class="quick-grid" id="quickGrid"></div>
      </section>

      <section class="directory-shell" id="directory" aria-label="AI 工具目录">
        <aside class="category-rail" aria-label="分类筛选">
          <div class="rail-title">
            <span>Categories</span>
            <button id="clearFilters" type="button">Reset</button>
          </div>
          <div class="category-list" id="categoryList"></div>
        </aside>

        <section class="results-panel">
          <div class="toolbar">
            <div>
              <p class="eyebrow">Search results</p>
              <h2 id="resultTitle">全部 AI 工具</h2>
              <p id="resultMeta" class="result-meta">正在加载...</p>
            </div>
            <div class="toolbar-actions">
              <div class="segmented" aria-label="价格筛选">
                <button class="active" type="button" data-price="all">全部</button>
                <button type="button" data-price="free">免费</button>
                <button type="button" data-price="freemium">免费增值</button>
                <button type="button" data-price="paid">付费</button>
              </div>
              <button class="new-filter-button" id="newOnlyToggle" type="button" aria-pressed="false">新增收录</button>
              <label class="select-label">
                <span>Sort</span>
                <select id="sortSelect">
                  <option value="featured">Featured</option>
                  <option value="name">Name A-Z</option>
                  <option value="category">Category</option>
                </select>
              </label>
            </div>
          </div>

          <div class="active-tags" id="activeTags" aria-live="polite"></div>
          <div class="tool-grid" id="toolGrid"></div>
          <div class="empty-state" id="emptyState" hidden>
            <div class="empty-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="6.5"/><path d="m20 20-4.2-4.2"/></svg>
            </div>
            <strong id="emptyTitle">没有找到匹配的工具</strong>
            <p class="empty-hint" id="emptyHint"></p>
            <div class="empty-actions">
              <button class="empty-action primary" type="button" id="emptyExpandSearch" hidden>在全站搜索</button>
              <button class="empty-action" type="button" id="emptyClearQuery">清空搜索词</button>
              <button class="empty-action subtle" type="button" id="emptyResetAll">重置全部筛选</button>
            </div>
            <section class="empty-suggestions" id="emptySuggestions" hidden>
              <p class="empty-suggestions-label">相关推荐</p>
              <div class="empty-suggestion-list" id="emptySuggestionList"></div>
            </section>
          </div>
        </section>

        <aside class="insight-rail" id="rankings" aria-label="AI 工具榜单">
          <section class="side-panel">
            <div class="side-title">
              <span>Trending</span>
              <strong>热门工具</strong>
            </div>
            <div class="mini-list" id="trendingList"></div>
          </section>
          <section class="side-panel">
            <div class="side-title">
              <span>New</span>
              <strong>最新收录</strong>
            </div>
            <div class="mini-list" id="newList"></div>
          </section>
          <section class="side-panel">
            <div class="side-title">
              <span>Tags</span>
              <strong>高频标签</strong>
            </div>
            <div class="tag-cloud" id="tagCloud"></div>
          </section>
        </aside>
      </section>
    </main>

    <footer class="site-footer">
      <span>AI 导航星图</span>
      <a href="#top">返回顶部</a>
    </footer>
    </div>

    <script src="ambient-bg.js?v=700" defer></script>
    <script src="assets/logos/manifest.js?v=700"></script>
    <script src="script.js?v=700" defer></script>
  </body>
</html>
